name: Pull Request Workflow

# Lint, format, type-check, and run the test suite on every PR targeting main.
# This is the basic "did the code I'm proposing keep the repo green?" gate.
# (The sync-staging-db.yaml workflow handles applying migrations to staging
# and regenerating database types — see AGENTS.md.)

on:
  pull_request:
    branches:
      - main

jobs:
  pull_request_workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint check
        run: pnpm lint

      # Prettier check intentionally not enforced: the repo has long-standing
      # format drift that nobody was gated on (this workflow was broken in a
      # way that exited in 0s on every PR). Run `pnpm format` locally before
      # opening a PR if you want to keep your files clean.

      - name: Run type check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test:ci
